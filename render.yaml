# Blueprint Render: создайте PostgreSQL в дашборде и добавьте переменную DATABASE_URL в этот Web Service.
# В настройках сервиса укажите Root Directory: landing-design-mockup

services:
  - type: web
    name: car-notes
    runtime: node
    rootDir: landing-design-mockup
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
